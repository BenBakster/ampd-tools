// Build flat question list: [{type:"L",id:1,uk:"...",ru:"..."}, {type:"P",id:0,...}]
var ALL=[];
for(var i=0;i<80;i++)ALL.push({t:"L",id:i+1,uk:LPFS_UK[i],ru:LPFS_RU[i]});
for(var i=0;i<220;i++)ALL.push({t:"P",id:i,uk:PID_UK[i],ru:PID_RU[i]});
var PAGES=Math.ceil(ALL.length/PAGE);

function renderPage(){
  var lb=UI[curLang];
  var start=curPage*PAGE;
  var end=Math.min(start+PAGE,ALL.length);
  var h="";
  // Show phase header if this page starts a new phase
  var firstQ=ALL[start];
  if(start===0){
    h+='<div class="ptitle"><h2>'+lb.p1+'</h2><p>'+lb.p1s+'</p></div>';
    h+='<div class="info">'+lb.p1i+'</div>';
  }else if(start<=80&&end>80){
    // Page straddles boundary
  }
  // Check if PID-5 starts on this page
  for(var qi=start;qi<end;qi++){
    if(qi===80){
      h+='<div class="ptitle" style="border-color:#8e44ad"><h2>'+lb.p2+'</h2><p>'+lb.p2s+'</p></div>';
      h+='<div class="info">'+lb.p2i+'</div>';
    }
    var q=ALL[qi];
    var txt=curLang==="ru"?q.ru:q.uk;
    var isL=q.t==="L";
    var qid=isL?"qL"+q.id:"qP"+q.id;
    var num=isL?q.id:(q.id+1);
    var total=isL?80:220;
    var part=isL?"1":"2";
    var answered=isL?(ansL[q.id]!==undefined):(ansP[q.id]!==undefined);
    var cls="q"+(answered?" done":"");
    h+='<div class="'+cls+'" id="'+qid+'">';
    h+='<div class="n">'+num+'/'+total+' \u00b7 '+lb.pt+' '+part+'</div>';
    h+='<div class="t">'+txt+'</div>';
    h+='<div class="opts" role="radiogroup">';
    if(isL){
      for(var j=1;j<=4;j++){
        var sel=ansL[q.id]===j?" sel":"";
        h+='<label id="lL'+q.id+'_'+j+'" data-t="L" data-q="'+q.id+'" data-v="'+j+'" class="'+sel+'"><input type="radio" name="'+qid+'" value="'+j+'"><span>'+lb.lO[j-1]+'</span></label>';
      }
    }else{
      for(var j=0;j<=3;j++){
        var sel=ansP[q.id]===j?" sel":"";
        h+='<label id="lP'+q.id+'_'+j+'" data-t="P" data-q="'+q.id+'" data-v="'+j+'" class="'+sel+'"><input type="radio" name="'+qid+'" value="'+j+'"><span>'+lb.pO[j]+'</span></label>';
      }
    }
    h+='</div></div>';
  }
  document.getElementById("qwrap").innerHTML=h;
  // Update pager
  document.getElementById("prevBtn").disabled=curPage===0;
  document.getElementById("nextBtn").disabled=curPage>=PAGES-1;
  document.getElementById("pgTxt").textContent=(curPage+1)+"/"+PAGES;
  window.scrollTo(0,0);
}

function pickL(id,v){
  ansL[id]=v;
  for(var j=1;j<=4;j++){var e=document.getElementById("lL"+id+"_"+j);if(e)e.className=(j===v?"sel":"");}
  var q=document.getElementById("qL"+id);if(q)q.className="q done";
  save();upd();
}
function pickP(id,v){
  ansP[id]=v;
  for(var j=0;j<=3;j++){var e=document.getElementById("lP"+id+"_"+j);if(e)e.className=(j===v?"sel":"");}
  var q=document.getElementById("qP"+id);if(q)q.className="q done";
  save();upd();
}
function upd(){
  var c=Object.keys(ansL).length+Object.keys(ansP).length;
  document.getElementById("pf").style.width=Math.round(c/TOTAL*100)+"%";
  document.getElementById("pt").textContent=c+"/"+TOTAL;
  document.getElementById("bg").className=c===TOTAL?"btn-res show":"btn-res";
  document.getElementById("bs").className=(c>0&&c<TOTAL)?"btn-skip show":"btn-skip";
  document.getElementById("btnClr").className=(c>0)?"btn-clr show":"btn-clr";
}
function save(){
  try{

    localStorage.setItem("ampd_pid",document.getElementById("pid").value);

}
function load(){
  try{

function clearAll(){

function findSkipped(){
  // Find first unanswered question globally
  for(var i=0;i<ALL.length;i++){
    var q=ALL[i];
    var answered=q.t==="L"?(ansL[q.id]!==undefined):(ansP[q.id]!==undefined);
    if(!answered){
      var pg=Math.floor(i/PAGE);
      if(pg!==curPage){curPage=pg;renderPage();upd();}
      var qid=q.t==="L"?"qL"+q.id:"qP"+q.id;
      var el=document.getElementById(qid);
      if(el){el.className="q missed";el.scrollIntoView({behavior:"smooth",block:"center"});}
      return;
    }
  }
}

function packResult(){
  var L="";for(var i=1;i<=80;i++)L+=(ansL[i]!==undefined?ansL[i]:"-");
  var P="";for(var i=0;i<=219;i++)P+=(ansP[i]!==undefined?ansP[i]:"-");
  var nm=(document.getElementById("pid")||{value:""}).value||"";
  var ts=new Date().toISOString().slice(0,10);
  var s="v1|"+curLang+"|"+ts+"|"+nm+"|"+L+"|"+P;
  try{return btoa(unescape(encodeURIComponent(s)));}catch(e){return"";}
}
function unpackResult(b){
  try{
    var s=decodeURIComponent(escape(atob(b)));
    var p=s.split("|");if(p[0]!=="v1")return null;
    var L=p[4]||"",P=p[5]||"",aL={},aP={};
    for(var i=0;i<L.length;i++){if(L.charAt(i)!=="-")aL[i+1]=parseInt(L.charAt(i),10);}
    for(var i=0;i<P.length;i++){if(P.charAt(i)!=="-")aP[i]=parseInt(P.charAt(i),10);}
    return{lang:p[1]||"uk",ts:p[2]||"",name:p[3]||"",ansL:aL,ansP:aP};
  }catch(e){return null;}
}
function showToast(msg){
  var t=document.getElementById("toast");if(!t)return;
  t.textContent=msg;t.className="toast show";
  clearTimeout(showToast._t);showToast._t=setTimeout(function(){t.className="toast";},1800);
}
function copyText(txt,onok){
  function fb(){
    try{
      var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();
      var ok=document.execCommand("copy");document.body.removeChild(ta);if(ok&&onok)onok();else if(!ok)showToast("Не вдалося скопіювати");
    }catch(e){showToast("Не вдалося скопіювати");}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){if(onok)onok();},fb);
  }else fb();
}
function buildTextReport(){
  if(!__report)return"";
  var r=__report,nl="\n",out="AMPD — Результати"+nl;
  if(r.name)out+="Ім'я: "+r.name+nl;
  out+="Дата: "+r.date+nl+nl;
  out+="Валідність: VRIN="+r.vrin+" | ORS="+r.ors+" | PRD="+r.prd;
  if(r.validityWarn)out+=" ⚠ "+r.validityWarn;
  out+=nl+nl+"Критерій A — LPFS-SR:"+nl;
  for(var i=0;i<r.lpfs.length;i++){var x=r.lpfs[i];out+="  "+x.name+": "+x.score.toFixed(1)+" — "+x.sev+nl;}
  out+=nl+"Критерій B — PID-5 (T-бали):"+nl;
  for(var i=0;i<r.domains.length;i++){
    var d=r.domains[i];out+="  "+d.name+": T="+d.T+" ("+d.label+")"+nl;
    for(var j=0;j<d.facets.length;j++){var f=d.facets[j];if(f.T>=65)out+="    • "+f.name+": T="+f.T+nl;}
  }
  if(r.extraElevated.length){out+=nl+"Додаткові фасети (T≥65):"+nl;for(var i=0;i<r.extraElevated.length;i++){var f=r.extraElevated[i];out+="  • "+f.name+": T="+f.T+nl;}}
  out+=nl+"— ampd-tools";
  return out;
}

  var lb=UI[curLang];
  if(!AMPD_BOT_ENDPOINT){showToast(lb.endpointMissing);return;}
  var enc=packResult();if(!enc){showToast(lb.encodeErr);return;}
  var nm=(document.getElementById("pid")||{value:""}).value||null;
  var rpt=buildTextReport()||null;
  var btn=document.getElementById("btnBot");if(btn)btn.disabled=true;
  showToast(lb.sending);
  fetch(AMPD_BOT_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({payload:enc,name:nm,report_text:rpt})})
    .then(function(resp){
      if(!resp.ok){return resp.json().then(function(e){throw new Error(e.error||resp.status);},function(){throw new Error(String(resp.status));});}
      return resp.json();
    })
    .then(function(d){
      showToast(lb.openingTg);
      if(btn){btn.className="btn-bot ok";}
      window.location.href=d.deep_link;
    })
    .catch(function(e){
      showToast(lb.errPrefix+(e.message||"connection"));
      if(btn)btn.disabled=false;
    });
}

// Event handlers
document.getElementById("form").addEventListener("click",function(e){
  var tgt=e.target;
  var label=tgt.closest?tgt.closest(".opts label"):null;
  if(!label){
    // Manual fallback
    var el=tgt;
    while(el&&el!==this){
      if(el.tagName==="LABEL"&&el.parentElement&&el.parentElement.className&&el.parentElement.className.indexOf("opts")>=0){label=el;break;}
      el=el.parentElement;
    }
  }
  if(!label)return;
  e.preventDefault();
  var t=label.getAttribute("data-t")||"";
  var q=parseInt(label.getAttribute("data-q")||"0",10);
  var v=parseInt(label.getAttribute("data-v")||"0",10);
  if(t==="L")pickL(q,v);
  else if(t==="P")pickP(q,v);
},false);
